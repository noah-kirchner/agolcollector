<!DOCTYPE html>
<html>
  <head>
    
    <!-- Meta for browser to allow for mobile-first design -->
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <title>Data Collector for AGOL</title>

    <style>
        html,
        body,
        #viewDiv {
        padding: 0;
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        }
        .addRecordBtn {
        position: absolute;
        z-index: 12;
        top: 16px;
        right: 16px;
        background-color: #5C7FA3;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
        }
        .addRecordBtn:hover {
        background-color: #5C7FA3;
        }
    </style>
    
    <!-- Import CSS libraries for esri.js -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.26/"></script>
    
    <!-- Load modules -->
    <script>
        require(["esri/config" ,"esri/Map", "esri/views/MapView", "esri/widgets/Locate", "esri/widgets/Search", "esri/widgets/Expand", "esri/layers/FeatureLayer"], (esriConfig, Map, MapView, Locate, Search, Expand, FeatureLayer) => {
            esriConfig.apiKey = 'AAPTahTxVFpq9q8MnwLiObY9CFA..GevNuz4SYr30TZAqUePx7AbFVJwzZ-75HZibp8q8X_hA6TPW8HykfyNv5UHSBrihV7wxRIuKMljM6Td7CGL-I-NoeohsNNN5-DscbLXxR160xjEKWljGwLKFTpbzjgKaCifG2LdFV6cjTrLyMfUN-QAwkcjGsxBAqrSoOkHtwm_Dp1Xq27w69mwKCTvvpkW7gCybTou8IRHbLRUoFRW1eICV-wSPJ2lBluUTLPvrOLmOa-qtmDDRDzd5yR7OMvH6f8I9I7fFzw..AT1_IMV5kkt8';
            
            const map = new Map({
                basemap: "satellite"
            });
            const view = new MapView({
                container: "viewDiv", // Reference to the DOM node that will contain the view
                map: map, // References the map object
                center: [-77.0264, 38.9015], // Washington, DC
                zoom: 14
            });
            
            const locateBtn = new Locate({
            view: view
            });

            // Create featurelayer from feature service 
            const layer = new FeatureLayer({ 
            // URL to the service 
            url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/survey123_f66692db71504712b7f686c499a50e8a_results/FeatureServer"
            });

            map.add(layer);

            // Add the locate widget to the top left corner of the view
            view.ui.add(locateBtn, {
            position: "top-left"
            });

            // Load 'esri/widgets/expand'
            const searchWidget = new Search({
                view: view
            });

            // Wrap the search widget in the expand widget
            const searchExpand = new Expand({
                view: view,
                content: searchWidget,
                expandIcon: "search"
            });

            // Listen for errors on the Locate button
            locateBtn.on("locate-error", (event) => {
                console.error("Locate Widget Error:", event.error);
                alert("Unable to find your location. Please check your phone's privacy settings or ensure your GPS signal is strong.");
            });

            // Catch errors when the layer fails to load
            layer.load().catch((error) => {
                console.error("FeatureLayer failed to load:", error);
                alert("Notice: The survey data layer is temporarily unavailable. You can still add a record using the submission form.");
            });

            // Add the expand widget to the view instead of the search widget
            view.ui.add(searchExpand, {
                position: "top-left",
                index: 0
            });
        });
    </script>
  </head>
  <body>
    <a href="https://survey123.arcgis.com/share/55a1dcb95cfe435a8b16cebfd83afef4"target="_blank" class="addRecordBtn">Add Record</a>
    <div id="viewDiv"></div>
  </body>
</html>
